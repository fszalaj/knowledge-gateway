version: 2
# Keep the SHA-pinned GitHub Actions and the Python/uv dependency tree current.
# Dependabot opens small PRs; CI (and branch protection) gate them.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
